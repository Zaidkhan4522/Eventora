<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Entertainment — Eventora</title>
    <!-- Font Awesome & Google Fonts (same as index) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        /* ----------------------------------------------------------
           COMPLETE LUXURY DARK THEME – MATCHES INDEX & OTHER PAGES
           Vertical nav slider, fixed background, gold accents, glass cards
        ------------------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.nav-open {
            overflow: hidden;
        }

        /* ---------- FIXED BACKGROUND (same as index) ---------- */
        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -2;
            background:
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center/cover;
            background-attachment: fixed;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(10, 10, 10, 0.3);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* ---------- VERTICAL NAVBAR (copied from index) ---------- */
        .vertical-nav {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 30px 0;
        }

        .vertical-nav.active {
            left: 0;
        }

        .nav-toggle {
            position: fixed;
            left: 30px;
            top: 30px;
            z-index: 1001;
            background: #d4af37;
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-toggle:hover {
            background: #c19b30;
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }

        .nav-logo {
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .nav-logo a {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo i {
            margin-right: 12px;
            font-size: 28px;
        }

        /* Top Auth Buttons in Navbar (fixed to right corner) */
        .nav-top-auth {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: auto !important;
            height: auto !important;
            padding: 0 !important;
        }

        .nav-top-auth-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .nav-top-auth-btn.login {
            background: #d4af37;
            color: white;
        }

        .nav-top-auth-btn.login:hover {
            background: #c19b30;
        }

        .nav-top-auth-btn.signup {
            background: white;
            color: #333;
        }

        .nav-top-auth-btn.signup:hover {
            background: #f2f2f2;
        }

        .nav-top-auth-btn.logout {
            background: #e74c3c;
            color: white;
            display: none;
        }

        .nav-top-auth-btn.logout:hover {
            background: #c0392b;
        }

        /* User info display when logged in (nav top) */
        .nav-top-user-info {
            display: none;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 20px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            animation: fadeIn 0.5s ease;
        }

        .nav-top-user-info i {
            font-size: 20px;
            color: #d4af37;
            margin-right: 12px;
        }

        .nav-top-user-details {
            flex: 1;
        }

        .nav-top-user-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .nav-top-user-email {
            font-weight: 400;
            color: #666;
            font-size: 12px;
        }

        .vertical-nav-links {
            list-style: none;
            padding: 0;
        }

        .vertical-nav-links li {
            margin-bottom: 8px;
            padding: 0 15px;
        }

        .vertical-nav-links a {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            font-size: 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .vertical-nav-links a i {
            margin-right: 15px;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .vertical-nav-links a:hover {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            transform: translateX(8px);
        }

        .vertical-nav-links a.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            color: #d4af37;
            font-weight: 600;
        }

        .vertical-nav-links a.active:before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: #d4af37;
            border-radius: 0 4px 4px 0;
        }

        /* Auth Section at bottom of Navbar */
        .nav-auth {
            padding: 30px 20px 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .user-info {
            display: none;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 12px;
        }

        .user-info i {
            font-size: 24px;
            color: #d4af37;
            margin-right: 15px;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            font-size: 16px;
            margin-bottom: 3px;
        }

        .user-email {
            font-weight: 400;
            color: #666;
            font-size: 13px;
        }

        .nav-auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-auth-btn {
            padding: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-auth-btn i {
            margin-right: 12px;
        }

        .nav-auth-btn.primary {
            background: linear-gradient(135deg, #d4af37, #c19b30);
            color: white;
        }

        .nav-auth-btn.primary:hover {
            background: linear-gradient(135deg, #c19b30, #b6992e);
            transform: translateY(-3px);
        }

        .nav-auth-btn.secondary {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-auth-btn.secondary:hover {
            background: white;
            transform: translateY(-3px);
        }

        .nav-auth-btn.danger {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            display: none;
        }

        /* Overlay when nav is open on mobile */
        .nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        .nav-overlay.active {
            display: block;
        }

        /* ---------- MAIN CONTENT WRAPPER (shift when nav open) ---------- */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px 80px;
            position: relative;
            z-index: 5;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.nav-open .content-wrapper {
            transform: translateX(280px);
        }

        @media (max-width: 768px) {
            body.nav-open .content-wrapper {
                transform: translateX(0);
            }
        }

        /* ---------- TYPOGRAPHY –– GOLD, PLAYFAIR ---------- */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            animation: fadeInDown 0.9s ease;
        }

        .page-subtitle {
            text-align: center;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 50px;
            font-weight: 300;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            border-bottom: 1px solid rgba(212, 175, 55, 0.5);
            padding-bottom: 20px;
            animation: fadeInDown 0.9s 0.1s both;
        }

        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-25px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- FILTER SECTION –– ELEGANT GLASS CARD (horizontal) ---------- */
        .filter-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 18px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 60px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s 0.2s both;
        }

        .filter-container label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            font-size: 15px;
            text-transform: capitalize;
        }

        .filter-container label:has(input:checked) {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
            color: white;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .filter-container input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #d4af37;
            margin: 0;
            cursor: pointer;
        }

        /* ---------- ENTERTAINMENT GRID –– LUXURY GLASS CARDS ---------- */
        .entertainment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
            padding-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: cardAppear 0.7s ease;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 40px 70px -10px rgba(212, 175, 55, 0.25);
        }

        .thumb {
            width: 100%;
            height: 220px;
            overflow: hidden;
            flex: 0 0 auto;
            position: relative;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }

        .card:hover .thumb img {
            transform: scale(1.15);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            z-index: 2;
            text-transform: uppercase;
        }

        .card-body {
            padding: 26px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 10px;
            color: white;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .meta {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 14px;
            border-radius: 40px;
            width: fit-content;
        }

        .meta i {
            color: #d4af37;
            margin-right: 4px;
        }

        .desc {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.98rem;
            line-height: 1.7;
            margin-bottom: 22px;
            flex: 1;
            font-style: italic;
        }

        .actions {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .btn {
            background: linear-gradient(145deg, #d4af37, #c19b30);
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 18px rgba(212, 175, 55, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn i {
            font-size: 0.95rem;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(145deg, #c19b30, #b28929);
            transform: translateX(6px);
            box-shadow: 0 12px 28px rgba(212, 175, 55, 0.45);
        }

        .btn:hover i {
            transform: translateX(4px);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* empty state */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            border: 1px dashed #d4af37;
            grid-column: 1 / -1;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1000px) {
            h1 {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .vertical-nav {
                width: 100%;
                left: -100%;
            }

            body.nav-open .vertical-nav {
                left: 0;
            }

            .nav-toggle {
                left: 20px;
                top: 20px;
                width: 50px;
                height: 50px;
                font-size: 22px;
            }

            .nav-top-auth {
                top: 15px;
                right: 15px;
            }

            .nav-top-auth-btn {
                padding: 8px 12px;
                font-size: 13px;
            }

            .content-wrapper {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .filter-container {
                border-radius: 30px;
                padding: 20px;
            }

            .filter-container label {
                padding: 8px 18px;
                font-size: 13px;
            }

            .entertainment-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 576px) {
            h1 {
                font-size: 2.2rem;
            }

            .page-subtitle {
                font-size: 1.1rem;
            }

            .entertainment-grid {
                grid-template-columns: 1fr;
            }

            .thumb {
                height: 200px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <!-- FIXED LUXURY BACKGROUND -->
    <div class="fixed-bg"></div>
    <div class="bg-overlay"></div>

    <!-- VERTICAL NAVBAR (full slider from index) -->
    <nav class="vertical-nav" id="verticalNav">
        <div class="nav-logo">
            <br><br><br>
            <a href="index.html"><i class="fas fa-heart"></i>Eventora</a>
        </div>

        <!-- User info display when logged in (top of nav) -->
        <div class="nav-top-user-info" id="navTopUserInfo">
            <i class="fas fa-user-circle"></i>
            <div class="nav-top-user-details">
                <div class="nav-top-user-name" id="navTopUserName">Guest</div>
                <div class="nav-top-user-email" id="navTopUserEmail">Not logged in</div>
            </div>
        </div>

        <ul class="vertical-nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="Venues.html"><i class="fas fa-building"></i> Venues</a></li>
            <li><a href="photographers.html"><i class="fas fa-camera"></i> Photographers</a></li>
            <li><a href="Wedding Caterers.html"><i class="fas fa-utensils"></i> Caterers</a></li>
            <li><a href="entertainment.html" class="active"><i class="fas fa-music"></i> Entertainment</a></li>

        </ul>

        <!-- Auth Section at bottom of Navbar -->
        <div class="nav-auth">
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <div class="user-details">
                    <div class="user-name" id="userName">Guest</div>
                    <div class="user-email" id="userEmailNav">Not logged in</div>
                </div>
            </div>
            <div class="nav-auth-buttons">
                <button id="navLoginBtn" class="nav-auth-btn primary"><i class="fas fa-sign-in-alt"></i> Login</button>
                <button id="navSignupBtn" class="nav-auth-btn secondary"><i class="fas fa-user-plus"></i> Sign
                    Up</button>
                <button id="navLogoutBtn" class="nav-auth-btn danger" style="display: none;"><i
                        class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Nav Toggle Button -->
    <button class="nav-toggle" id="navToggle">
        <i class="fas fa-bars" id="navToggleIcon"></i>
    </button>

    <!-- Overlay for mobile -->
    <div class="nav-overlay" id="navOverlay"></div>

    <!-- TOP RIGHT AUTH BUTTONS (fixed) -->
    <div class="top-auth">

      <!-- LOGIN BUTTON -->
      <button id="topLoginBtn" class="login-btn">
        Login
      </button>

      <!-- PROFILE SECTION -->
      <div id="profileContainer">

        <img id="userPhoto" src="" alt="Profile">

        <button id="logoutBtn">
          Logout
        </button>

      </div>

    </div>

    <img id="navUserPhoto" width="40" height="40" style="border-radius:50%;">

    <span id="navUserName"></span>

    <button id="logoutBtn">Logout</button>

    </div>
    </div>

    <!-- MAIN CONTENT WRAPPER (shifts when nav opens) -->
    <div class="content-wrapper">
        <!-- PAGE HEADER -->
        <h1>Wedding Entertainment</h1>
        <p class="page-subtitle">
            <i class="fas fa-music" style="color: #d4af37; margin-right: 10px;"></i>
            From live bands to DJs and specialty acts – set the perfect vibe for your celebration.
        </p>

        <!-- FILTERS – glass horizontal card -->
        <div class="filter-container" id="filterContainer"></div>

        <!-- ENTERTAINMENT GRID -->
        <main class="entertainment-grid" id="entertainmentGrid" aria-live="polite"></main>
    </div>

    <!-- subtle footer note -->
    <div
        style="text-align: center; margin-top: 20px; padding: 20px; color: rgba(255,255,255,0.4); font-size: 0.85rem; border-top: 1px solid rgba(212,175,55,0.2); max-width: 1400px; margin-left: auto; margin-right: auto;">
        <i class="fas fa-heart" style="color: #d4af37;"></i> Weddings begin here – Eventora
    </div>

    <script>
        // ============================================
        // NAVBAR SLIDER FUNCTIONALITY (from index)
        // ============================================
        const navToggle = document.getElementById('navToggle');
        const verticalNav = document.getElementById('verticalNav');
        const navToggleIcon = document.getElementById('navToggleIcon');
        const navOverlay = document.getElementById('navOverlay');
        const body = document.body;
        const contentWrapper = document.querySelector('.content-wrapper');

        const grid = document.getElementById('entertainmentGrid');
        const filterContainer = document.getElementById('filterContainer');

        // Create filter buttons (radio style) - categories
        const categories = ['all', 'dj', 'live-band', 'classical', 'percussion', 'specialty'];
        const categoryNames = {
            'all': 'All Acts',
            'dj': 'DJs',
            'live-band': 'Live Bands',
            'classical': 'Classical',
            'percussion': 'Percussion',
            'specialty': 'Specialty Acts'
        };

        categories.forEach(cat => {
            const label = document.createElement('label');
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'filter';
            input.value = cat;
            if (cat === 'all') input.checked = true;
            input.addEventListener('change', filterEntertainers);
            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + categoryNames[cat]));
            filterContainer.appendChild(label);
        });

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        function createCard(e) {
            const badgeHtml = e.badge ? `<span class="badge">${escapeHtml(e.badge)}</span>` : '';
            return `
            <article class="card" role="article" onclick="openEntertainer('${e.id}')">
                <div class="thumb" aria-hidden="true">
                    ${badgeHtml}
                    <img loading="lazy" src="${e.image}" alt="${escapeHtml(e.name)}">
                </div>
                <div class="card-body">
                    <h3>${escapeHtml(e.name)}</h3>
                    <div class="meta"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(e.location)} • ${escapeHtml(e.style)}</div>
                    <div class="desc">“${escapeHtml(e.desc)}”</div>
                    <div class="meta" style="background: rgba(212,175,55,0.08); margin-top: 5px;"><i class="fas fa-tag"></i> ${e.price}</div>
                    <div class="actions">
                        <button class="btn" onclick="event.stopPropagation(); openEntertainer('${e.id}')"><i class="fas fa-calendar-check"></i> Check Availability</button>
                        <button class="btn secondary" onclick="event.stopPropagation(); openQuickInfo('${e.id}')"><i class="fas fa-headphones"></i> Preview</button>
                    </div>
                </div>
            </article>`;
        }

        function render(items) {
            if (items.length === 0) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-music" style="color: #d4af37; margin-right: 10px;"></i> No entertainment vendors found. Try another filter.</div>`;
                return;
            }
            grid.innerHTML = items.map(createCard).join('');
        }

        function filterEntertainers() {
            const selected = document.querySelector('.filter-container input[name="filter"]:checked').value;
            if (selected === "all") { render(entertainers); return; }
            const filtered = entertainers.filter(e => e.category === selected);
            render(filtered);
        }

        window.openEntertainer = function (id) {
            window.location.href = `entertainer-details.html?entertainer=${encodeURIComponent(id)}`;
        };

        window.openQuickInfo = function (id) {
            const e = entertainers.find(x => x.id === id);
            if (!e) return;
            alert(`${e.name}\n\n📍 ${e.location}\n🎵 ${e.style}\n💰 ${e.price}\n\n${e.desc}`);
        };

        // Initial render
        render(entertainers);
    </script>
